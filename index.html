<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIMEC · Informe de Dirección</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --brand: #1F2A4E;
            --brand-dark: #131C36;
            --brand-light: #3A5C94;
            --brand-soft: #7FA8C4;
            --brand-tint: #EEF3F8;
            --gold: #448497;
            --green: #0B8C8C;
            --red: #B4474C;
            --slate: #8A94A6;
            --ink: #1B2230;
            --muted: #667085;
            --line: #E6EBF0;
            --bg: #F4F7FA;
            --card: #FFFFFF;
            --shadow: 0 1px 2px rgba(31,42,78,.04), 0 8px 24px -12px rgba(31,42,78,.12);
            --shadow-lg: 0 2px 4px rgba(31,42,78,.05), 0 24px 48px -20px rgba(31,42,78,.22);
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
            font-variant-numeric: tabular-nums;
        }
        .serif { font-family: 'Montserrat', sans-serif; }

        /* ---------- LOGIN ---------- */
        .login-container {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 24px;
            background:
              radial-gradient(1200px 600px at 20% -10%, rgba(58,92,148,.55), transparent 55%),
              radial-gradient(900px 500px at 100% 110%, rgba(19,28,54,.9), transparent 50%),
              linear-gradient(140deg, #131C36 0%, #1F2A4E 55%, #0E1428 100%);
        }
        .login-box {
            background: rgba(255,255,255,.98);
            padding: 44px 40px; border-radius: 20px;
            box-shadow: 0 40px 80px -24px rgba(0,0,0,.5);
            width: 100%; max-width: 400px; text-align: center;
        }
        .login-logo {
            width: 56px; height: 56px; margin: 0 auto 18px;
            border-radius: 14px; background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 28px;
            box-shadow: 0 10px 24px -8px rgba(31,42,78,.6);
        }
        .login-box h1 { font-size: 20px; margin-bottom: 4px; color: var(--ink); font-weight: 700; }
        .login-box .sub { font-size: 13px; color: var(--muted); margin-bottom: 26px; }
        .login-box input {
            width: 100%; padding: 13px 14px; margin-bottom: 16px;
            border: 1.5px solid var(--line); border-radius: 10px; font-size: 15px;
            transition: border-color .2s, box-shadow .2s; font-family: inherit;
        }
        .login-box input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 4px rgba(31,42,78,.12); }
        .login-box button {
            width: 100%; padding: 13px; background: var(--brand); color: #fff;
            border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background .2s, transform .1s; font-family: inherit;
        }
        .login-box button:hover { background: var(--brand-dark); }
        .login-box button:active { transform: translateY(1px); }
        .error { color: var(--red); font-size: 13px; margin-bottom: 12px; min-height: 16px; }

        /* ---------- SHELL ---------- */
        .dashboard { display: none; min-height: 100vh; }
        .dashboard.active { display: block; }

        .topbar {
            background: linear-gradient(120deg, var(--brand-dark) 0%, var(--brand) 60%, #2E5082 100%);
            color: #fff; padding: 22px 32px;
        }
        .topbar-inner { max-width: 1440px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
        .brand-lockup { display: flex; align-items: center; gap: 14px; }
        .brand-mark {
            width: 44px; height: 44px; border-radius: 11px;
            background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.25);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 22px; color: #fff;
        }
        .brand-text h1 { font-family: 'Montserrat', sans-serif; font-size: 21px; font-weight: 600; letter-spacing: .2px; line-height: 1.1; }
        .brand-text .tag { font-size: 12px; opacity: .78; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 3px; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .live-badge {
            display: inline-flex; align-items: center; gap: 7px;
            background: rgba(0,155,155,.2); border: 1px solid rgba(105,194,194,.5);
            color: #A9ECEC; padding: 7px 13px; border-radius: 999px; font-size: 12px; font-weight: 600;
        }
        .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #2FD4D4; box-shadow: 0 0 0 0 rgba(47,212,212,.7); animation: pulse 2s infinite; }
        @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(47,212,212,.6)} 70%{box-shadow:0 0 0 8px rgba(47,212,212,0)} 100%{box-shadow:0 0 0 0 rgba(47,212,212,0)} }
        .logout-btn {
            background: rgba(255,255,255,.12); color: #fff; border: 1px solid rgba(255,255,255,.25);
            padding: 8px 15px; border-radius: 9px; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; transition: background .2s;
        }
        .logout-btn:hover { background: rgba(255,255,255,.22); }

        .subbar {
            max-width: 1440px; margin: 0 auto; padding: 16px 32px 0;
            display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
        }
        .meta-line { font-size: 13px; color: var(--muted); }
        .meta-line strong { color: var(--brand); font-weight: 600; }

        .filters {
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
            background: var(--card); padding: 8px; border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--line);
        }
        .seg { display: flex; gap: 2px; background: var(--brand-tint); padding: 3px; border-radius: 9px; }
        .filter-btn {
            padding: 7px 14px; border: none; background: transparent; border-radius: 7px;
            cursor: pointer; font-size: 12.5px; font-weight: 600; color: var(--brand); font-family: inherit; transition: all .15s;
        }
        .filter-btn:hover { background: rgba(31,42,78,.08); }
        .filter-btn.active { background: var(--brand); color: #fff; box-shadow: 0 4px 10px -4px rgba(31,42,78,.5); }
        .filter-divider { width: 1px; height: 22px; background: var(--line); margin: 0 4px; }
        .filter-input {
            padding: 7px 10px; border: 1.5px solid var(--line); border-radius: 8px; font-size: 12.5px; width: 118px; font-family: inherit; color: var(--ink);
        }
        .filter-input:focus { outline: none; border-color: var(--brand); }
        .apply-btn {
            padding: 8px 16px; background: var(--ink); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12.5px; font-family: inherit;
        }
        .apply-btn:hover { background: #000; }

        .content { max-width: 1440px; margin: 0 auto; padding: 24px 32px 48px; }

        /* ---------- FUNNEL ---------- */
        .funnel {
            background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
            box-shadow: var(--shadow); padding: 24px 26px; margin-bottom: 22px;
        }
        .funnel-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
        .funnel-steps { display: flex; align-items: stretch; gap: 10px; }
        .fstep { flex: 1; text-align: center; position: relative; }
        .fbar {
            border-radius: 10px; color: #fff; padding: 16px 8px 14px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            min-height: 96px; transition: transform .2s; box-shadow: inset 0 -30px 40px -20px rgba(0,0,0,.25);
        }
        .fbar:hover { transform: translateY(-2px); }
        .fbar .fnum { font-size: 30px; font-weight: 800; line-height: 1; letter-spacing: -.5px; }
        .fbar .flabel { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; opacity: .92; margin-top: 6px; }
        .fconv { font-size: 11px; color: var(--muted); margin-top: 9px; font-weight: 600; }
        .fconv b { color: var(--brand); }

        /* ---------- KPI CARDS ---------- */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(168px, 1fr)); gap: 14px; margin-bottom: 22px; }
        .card {
            background: var(--card); border: 1px solid var(--line); border-radius: 14px;
            padding: 18px 18px 16px; box-shadow: var(--shadow); position: relative; overflow: hidden; transition: transform .2s, box-shadow .2s;
        }
        .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .card::before { content:""; position: absolute; top:0; left:0; right:0; height: 3px; background: var(--slate); }
        .card--f1::before{background:var(--slate)} .card--f2::before{background:var(--brand)}
        .card--f3::before{background:var(--brand-soft)} .card--f4::before{background:var(--gold)}
        .card--trash::before{background:var(--red)} .card--won::before{background:var(--green)}
        .card-label { font-size: 10.5px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 12px; }
        .card-value { font-size: 30px; font-weight: 800; color: var(--ink); letter-spacing: -.8px; line-height: 1; }
        .card-foot { font-size: 11px; color: var(--muted); margin-top: 8px; }

        .cards-grid.metrics .card { background: linear-gradient(160deg, #fff, var(--brand-tint)); }
        .cards-grid.metrics .card::before { background: linear-gradient(90deg, var(--brand), var(--brand-soft)); }
        .cards-grid.metrics .card-value { color: var(--brand); }

        /* ---------- SECTIONS ---------- */
        .section {
            background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
            box-shadow: var(--shadow); padding: 22px 24px; margin-bottom: 22px;
        }
        .section-title {
            font-size: 12px; font-weight: 700; color: var(--ink); text-transform: uppercase; letter-spacing: 1.2px;
            margin-bottom: 18px; padding-left: 12px; position: relative;
        }
        .section-title::before { content:""; position:absolute; left:0; top:1px; bottom:1px; width:4px; border-radius:3px; background: var(--brand); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
        .grid-2 .section { margin-bottom: 0; }

        /* ---------- TABLES ---------- */
        .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--line); }
        .table { width: 100%; font-size: 13px; border-collapse: collapse; min-width: 480px; }
        .table th {
            text-align: left; padding: 11px 14px; background: var(--brand-tint); color: var(--brand-dark);
            font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; position: sticky; top: 0;
        }
        .table td { padding: 11px 14px; border-top: 1px solid var(--line); white-space: nowrap; color: var(--ink); }
        .table tbody tr:nth-child(even) { background: #FBFAFB; }
        .table tbody tr:hover { background: var(--brand-tint); }
        .table td:first-child, .table th:first-child { position: sticky; left: 0; background: inherit; }
        .table thead th:first-child { background: var(--brand-tint); }
        .cell-strong { font-weight: 700; }
        .cell-win { color: var(--green); font-weight: 700; }
        .cell-zero { color: #D6D1DA; text-align: center; }
        .cell-total { font-weight: 800; color: var(--brand-dark); text-align: center; }
        .cell-heat { color: #fff; font-weight: 700; text-align: center; }
        .table td.num { text-align: center; }
        .rank-badge { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:6px; background:var(--brand-tint); color:var(--brand); font-size:10px; font-weight:700; margin-right:8px; }

        .chart-container { position: relative; height: 300px; }

        /* ---------- PODIO F1 ---------- */
        .podium { display: flex; align-items: flex-end; justify-content: center; gap: 22px; padding: 24px 0 0; flex-wrap: wrap; }
        .podium-step { flex: 0 0 190px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .podium-flag { font-size: 30px; margin-bottom: 4px; }
        .podium-name { font-weight: 700; font-size: 16px; color: var(--ink); margin-bottom: 3px; }
        .podium-won { font-size: 13px; color: var(--muted); margin-bottom: 10px; font-weight: 600; }
        .podium-won b { color: var(--green); font-size: 17px; }
        .podium-bar { width: 165px; border-radius: 14px 14px 0 0; position: relative; display: flex; align-items: flex-start; justify-content: center; box-shadow: inset 0 -22px 34px -12px rgba(0,0,0,.28); animation: podiumUp .7s cubic-bezier(.2,.8,.2,1); }
        .podium-bar.gold { background: linear-gradient(180deg,#F6D879,#C99B2C); }
        .podium-bar.silver { background: linear-gradient(180deg,#DBE1E9,#A3AEBE); }
        .podium-bar.bronze { background: linear-gradient(180deg,#E7AF77,#B4712F); }
        .podium-place { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 46px; color: #fff; margin-top: 16px; text-shadow: 0 2px 8px rgba(0,0,0,.35); }
        @keyframes podiumUp { from { transform: translateY(34px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }

        .footer { max-width: 1440px; margin: 0 auto; padding: 0 32px 40px; color: var(--muted); font-size: 12px; text-align: center; }
        .footer .brand-foot { font-family: 'Montserrat', sans-serif; color: var(--brand); font-weight: 600; }

        [class*="whatsapp"],[id*="whatsapp"],[class*="floating"],[class*="ai-"]{display:none!important}

        @media (max-width: 860px){
            .grid-2 { grid-template-columns: 1fr; }
            .topbar, .subbar, .content, .footer { padding-left: 18px; padding-right: 18px; }
            .funnel-steps { flex-wrap: wrap; }
            .fstep { flex: 1 1 30%; }
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <div class="login-logo">E</div>
            <h1>Informe de Dirección</h1>
            <div class="sub">EIMEC · Acceso restringido</div>
            <div id="errorMsg" class="error"></div>
            <input type="password" id="passwordInput" placeholder="Contraseña de acceso" onkeydown="if(event.key==='Enter')checkPassword()" />
            <button onclick="checkPassword()">Entrar al informe</button>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <header class="topbar">
            <div class="topbar-inner">
                <div class="brand-lockup">
                    <div class="brand-mark">E</div>
                    <div class="brand-text">
                        <h1>Informe de Dirección</h1>
                        <div class="tag">EIMEC · Business Intelligence</div>
                    </div>
                </div>
                <div class="topbar-right">
                    <span class="live-badge"><span class="live-dot"></span> ActiveCampaign · En vivo</span>
                    <button class="logout-btn" onclick="logout()">Salir</button>
                </div>
            </div>
        </header>

        <div class="subbar">
            <div class="meta-line" id="metaLine">Cargando periodo…</div>
            <div class="filters">
                <div class="seg">
                    <button class="filter-btn" data-range="7d" onclick="setDateRange('7d')">7 días</button>
                    <button class="filter-btn active" data-range="30d" onclick="setDateRange('30d')">30 días</button>
                    <button class="filter-btn" data-range="90d" onclick="setDateRange('90d')">90 días</button>
                    <button class="filter-btn" data-range="6m" onclick="setDateRange('6m')">6 meses</button>
                    <button class="filter-btn" data-range="1a" onclick="setDateRange('1a')">1 año</button>
                </div>
                <div class="filter-divider"></div>
                <input type="date" class="filter-input" id="fromDate" />
                <input type="date" class="filter-input" id="toDate" />
                <button class="apply-btn" onclick="applyCustomRange()">Aplicar</button>
            </div>
        </div>

        <div class="content" id="dashboardContent">
            <div class="loading">Cargando datos de ActiveCampaign…</div>
        </div>

        <div class="footer">
            Datos en vivo desde <b>ActiveCampaign</b> · Actualización automática cada 5 min · <span class="brand-foot">EIMEC</span> <span id="genStamp"></span>
        </div>
    </div>

    <script>
        const PASSWORD = 'eimec2026';
        const PALETTE = ['#1F2A4E','#2E5082','#448497','#009B9B','#69C2C2','#A0C8D8','#3A5C94','#7FA8C4','#4C5257','#8A94A6'];
        let charts = {};
        // ESTADO GLOBAL DEL FILTRO — TODO el informe (fetch, tablas, gráficos, auto-refresco) lo usa
        let currentRange = null;   // { from: Date, to: Date }

        function checkPassword() {
            const input = document.getElementById('passwordInput');
            const error = document.getElementById('errorMsg');
            if (input.value === PASSWORD) {
                sessionStorage.setItem('authenticated', 'true');
                showDashboard();
                loadDashboardData();
            } else {
                error.textContent = 'Contraseña incorrecta';
                input.value = '';
            }
        }
        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
        }
        function logout() {
            sessionStorage.removeItem('authenticated');
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('passwordInput').value = '';
        }

        function setDateRange(range) {
            const today = new Date();
            let from = new Date();
            switch(range) {
                case '7d': from.setDate(today.getDate() - 7); break;
                case '30d': from.setDate(today.getDate() - 30); break;
                case '90d': from.setDate(today.getDate() - 90); break;
                case '6m': from.setMonth(today.getMonth() - 6); break;
                case '1a': from.setFullYear(today.getFullYear() - 1); break;
            }
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-range') === range));
            // limpiar fechas manuales al usar un preset
            const fi = document.getElementById('fromDate'), ti = document.getElementById('toDate');
            if (fi) fi.value = ''; if (ti) ti.value = '';
            loadDashboardData(from, today);
        }
        function applyCustomRange() {
            const fromStr = document.getElementById('fromDate').value;
            const toStr = document.getElementById('toDate').value;
            if (!fromStr || !toStr) { alert('Selecciona ambas fechas'); return; }
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            loadDashboardData(new Date(fromStr), new Date(toStr));
        }

        async function loadDashboardData(fromDate, toDate) {
            // FILTRO GLOBAL: si no llega rango (ej. auto-refresco) usa el ÚLTIMO seleccionado; si no hay, 30 días por defecto.
            if (!fromDate || !toDate) {
                if (currentRange) { fromDate = currentRange.from; toDate = currentRange.to; }
                else { const _t=new Date(); const _f=new Date(); _f.setDate(_t.getDate()-30); fromDate=_f; toDate=_t; }
            }
            currentRange = { from: fromDate, to: toDate };   // recordar el rango para TODO (refrescos, re-render)
            const params = { from: fromDate.toISOString().split('T')[0], to: toDate.toISOString().split('T')[0] };
            const query = new URLSearchParams(params).toString();
            document.getElementById('metaLine').innerHTML = 'Calculando…';
            document.getElementById('dashboardContent').innerHTML = '<div class="loading">Calculando TODO el periodo (embudo · país · curso · vendedor)… puede tardar unos segundos la primera vez.</div>';
            try {
                // RENDER ATÓMICO: esperamos ambas fuentes y pintamos UNA sola vez → todo cuadra con el mismo rango
                const [dataRes, extraRes] = await Promise.all([
                    fetch(`/api/ac-data?${query}`),
                    fetch(`/api/ac-extra?${query}`).catch(()=>null)
                ]);
                const data = await dataRes.json();
                let extra = null;
                try { if (extraRes) { const e = await extraRes.json(); if (e && e.ok) extra = e; } } catch(_) {}
                if (!data.ok) { document.getElementById('dashboardContent').innerHTML = '<div class="loading" style="color:var(--red)">No se pudieron cargar los datos. Reintenta.</div>'; return; }
                renderDashboard(data, extra);
            } catch (error) {
                console.error(error);
                document.getElementById('dashboardContent').innerHTML = '<div class="loading" style="color:var(--red)">Error de conexión con ActiveCampaign.</div>';
            }
        }

        function fmtDate(iso){
            if(!iso) return '';
            const [y,m,d] = iso.split(' ')[0].split('-');
            return `${d}/${m}/${y}`;
        }

        function normPais(p){
            if(!p) return 'Sin pais';
            const k = String(p).trim();
            const m = {
                'US':'United States','USA':'United States','U.S.':'United States','U.S':'United States','EEUU':'United States','EE.UU.':'United States','Estados Unidos':'United States','United States of America':'United States',
                'UK':'United Kingdom','U.K.':'United Kingdom','Reino Unido':'United Kingdom','England':'United Kingdom','Great Britain':'United Kingdom',
                'España':'Spain','Espana':'Spain','ES':'Spain',
                'México':'Mexico','Mejico':'Mexico','Méjico':'Mexico',
                'Sin país':'Sin pais','':'Sin pais'
            };
            return m[k] || k;
        }
        function mergePipeline(pp){
            const out = {};
            Object.entries(pp||{}).forEach(([p,c])=>{
                const k = normPais(p);
                if(!out[k]) out[k]={f2:0,f3:0,f4:0,won:0};
                out[k].f2+=(c.f2||0); out[k].f3+=(c.f3||0); out[k].f4+=(c.f4||0); out[k].won+=(c.won||0);
            });
            return out;
        }
        function renderDashboard(data, extra) {
            const p = data.pipeline;
            const paisPP = mergePipeline(data.pais_pipeline);
            // FIX doble-conteo: el proxy WP cuenta en cada fase los tratos de CUALQUIER estado (incluidos los ya
            // GANADOS que siguen etiquetados en su etapa) → infla F4 y duplica los Won en el embudo acumulado.
            // ac-extra da el pipeline ABIERTO real (status=0). Capturamos esos totales ANTES de que el merge de Won
            // (más abajo) mute extra.totals, para usarlos en el embudo y en las tarjetas "estado actual".
            const _openF = (extra && extra.ok && extra.totals)
                ? { f1: extra.totals.f1||0, f2: extra.totals.f2||0, f3: extra.totals.f3||0, f4: extra.totals.f4||0 }
                : null;
            // "Paciente modelo" (captación para prácticas de formación) NO es venta. ac-extra ya lo excluyó de F1-F4;
            // aquí excluimos también sus WON para que embudo, tablas y totales no lo cuenten (todo sigue cuadrando).
            const pmWonSet = new Set((extra && extra.pm_won_ids) || []);
            // Cruzar los GANADOS del periodo (proxy won_deals = ganados por fecha de cierre, con país/curso)
            // con el vendedor (ac-extra won_owner). Así F1-F4 = creados en periodo y Won = ganados en periodo (cuadra con el funnel).
            if (extra && extra.ok && !extra._merged && Array.isArray(data.won_deals)) {
                const paisKey = v => { let k = v ? String(v).trim() : ''; return (!k || k.toLowerCase()==='sin pais' || k.toLowerCase()==='sin país') ? 'Sin país' : normPais(k); };
                const addWon = (b,k)=>{ if(!k) k='Sin dato'; if(!b[k]) b[k]={f1:0,f2:0,f3:0,f4:0,won:0,total:0}; b[k].won++; b[k].total++; };
                extra.by_owner=extra.by_owner||{}; extra.by_pais=extra.by_pais||{}; extra.by_curso=extra.by_curso||{}; extra.by_campaign=extra.by_campaign||{};
                data.won_deals.forEach(wd=>{
                    if (pmWonSet.has(wd.id)) return;   // excluir paciente modelo
                    addWon(extra.by_owner, (extra.won_owner&&extra.won_owner[wd.id])||'Sin asignar');
                    addWon(extra.by_pais, paisKey(wd.pais));
                    addWon(extra.by_curso, (wd.curso&&wd.curso.trim())?wd.curso.trim():'Sin curso');
                    addWon(extra.by_campaign, (extra.won_campaign&&extra.won_campaign[wd.id])||'Sin dato');
                });
                const T={f1:0,f2:0,f3:0,f4:0,won:0,total:0};
                Object.values(extra.by_pais).forEach(b=>{T.f1+=b.f1;T.f2+=b.f2;T.f3+=b.f3;T.f4+=b.f4;T.won+=b.won;T.total+=b.total;});
                extra.totals=T;
                extra._merged = true;   // evita doble conteo si se re-renderiza con el mismo objeto
            }
            const w = (data.won_deals||[]).filter(wd=>!pmWonSet.has(wd.id)).length;   // won del periodo, sin paciente modelo
            // F1-F4 del EMBUDO y de las tarjetas "estado actual": pipeline ABIERTO de ac-extra (no cuenta en su fase
            // a los ya ganados). Así cada trato se cuenta UNA vez (en su fase actual o en Won) y cuadra con las tablas
            // de país/campaña/vendedor. Fallback al proxy si ac-extra no está disponible.
            const pf = _openF || { f1: p.f1, f2: p.f2, f3: p.f3, f4: p.f4 };
            const t = pf.f1 + pf.f2 + pf.f3 + pf.f4 + w;   // total oportunidades del periodo (abiertos + ganados)
            // Embudo ACUMULADO: cuántos PASARON por cada fase (avance secuencial F1→F2→F3→F4→Won), sin doble conteo
            const reachedF1 = pf.f1 + pf.f2 + pf.f3 + pf.f4 + w;   // = total (todos entran por F1)
            const reachedF2 = pf.f2 + pf.f3 + pf.f4 + w;
            const reachedF3 = pf.f3 + pf.f4 + w;
            const reachedF4 = pf.f4 + w;
            const m1 = reachedF1 > 0 ? Math.round(reachedF2 / reachedF1 * 100) : 0;   // F1→F2
            const m2 = reachedF2 > 0 ? Math.round(w / reachedF2 * 100) : 0;           // F2→Won
            const m3 = t > 0 ? Math.round(w / t * 100) : 0;                           // win rate global
            const sc = data.won_deals.filter(x => !pmWonSet.has(x.id) && (!x.curso || x.curso === '')).length;

            // meta
            if (data.period) {
                document.getElementById('metaLine').innerHTML =
                    `Periodo analizado: <strong>${fmtDate(data.period.from)} — ${fmtDate(data.period.to)}</strong>`;
            }
            if (data.generated) document.getElementById('genStamp').textContent = '· ' + fmtDate(data.generated) + ' ' + (data.generated.split(' ')[1]||'');

            // FUNNEL
            const stages = [
                {k:'F1', label:'Solicitud', val:reachedF1, color:'#8A94A6'},
                {k:'F2', label:'Cualificado', val:reachedF2, color:'#1F2A4E'},
                {k:'F3', label:'Propuesta', val:reachedF3, color:'#2E5082'},
                {k:'F4', label:'Facturación', val:reachedF4, color:'#448497'},
                {k:'WON', label:'Ganado', val:w, color:'#009B9B'}
            ];
            const maxV = Math.max(...stages.map(s=>s.val), 1);
            let funnel = `<div class="funnel"><div class="funnel-head"><div class="section-title" style="margin:0;padding-left:12px">Embudo comercial · ${t} oportunidades</div><div style="font-size:11px;color:var(--muted)">Acumulado · los que pasaron por cada fase</div></div><div class="funnel-steps">`;
            stages.forEach((s,i)=>{
                const h = 60 + Math.round((s.val/maxV)*90);
                const prev = i>0 ? stages[i-1].val : null;
                const conv = (prev && prev>0) ? Math.round(s.val/prev*100) : 100;
                const share = t>0 ? Math.round(s.val/t*100) : 0;
                funnel += `<div class="fstep">
                    <div class="fbar" style="background:linear-gradient(160deg,${s.color},${s.color}dd);height:${h}px">
                        <div class="fnum">${s.val}</div><div class="flabel">${s.k} · ${s.label}</div>
                    </div>
                    <div class="fconv">${i===0 ? '<b>100%</b> · base' : '▸ <b>'+conv+'%</b> · '+share+'% del total'}</div>
                </div>`;
            });
            funnel += `</div></div>`;

            // KPI CARDS
            let html = funnel + `
                <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:6px 0 10px 2px">Tratos del periodo por fase actual · abiertos, sin acumular (F1-F4 = creados en el periodo · Won = cerrados en el periodo)</div>
                <div class="cards-grid">
                    <div class="card card--f1"><div class="card-label">F1 · Solicitud</div><div class="card-value">${pf.f1}</div></div>
                    <div class="card card--f2"><div class="card-label">F2 · Cualificado</div><div class="card-value">${pf.f2}</div></div>
                    <div class="card card--f3"><div class="card-label">F3 · Propuesta</div><div class="card-value">${pf.f3}</div></div>
                    <div class="card card--f4"><div class="card-label">F4 · Facturación</div><div class="card-value">${pf.f4}</div></div>
                    <div class="card card--trash"><div class="card-label">Descartados</div><div class="card-value">${p.trash}</div></div>
                    <div class="card card--won"><div class="card-label">Won · Cerrados</div><div class="card-value">${w}</div><div class="card-foot">Ganados en el periodo</div></div>
                </div>
                <div class="cards-grid metrics">
                    <div class="card"><div class="card-label">Conversión F1 → F2</div><div class="card-value">${m1}%</div><div class="card-foot">Leads que cualifican</div></div>
                    <div class="card"><div class="card-label">Conversión F2 → Won</div><div class="card-value">${m2}%</div><div class="card-foot">Cualificados que cierran</div></div>
                    <div class="card"><div class="card-label">Win Rate Global</div><div class="card-value">${m3}%</div><div class="card-foot">Won sobre total pipeline</div></div>
                    <div class="card"><div class="card-label">Sin curso asignado</div><div class="card-value">${sc}</div><div class="card-foot">Won sin programa etiquetado</div></div>
                </div>
            `;

            // 6 insights + recomendaciones (país/curso desde won del proxy; vendedor desde ac-extra)
            if (extra && extra.ok) html += renderInsights(extra, data);
            // Podio de países por ventas (F1)
            if (extra && extra.ok) html += renderPodium(extra);
            // Gráfico de TRATOS CREADOS por día (en el medio)
            if (extra && extra.ok && extra.created_by_date && Object.keys(extra.created_by_date).length) {
                html += `<div class="section"><div class="section-title">Tratos creados por día</div><div class="chart-container" style="height:280px"><canvas id="createdByDateChart"></canvas></div></div>`;
            }

            // Charts row
            html += `
                <div class="grid-2" style="margin-bottom:22px">
                    <div class="section"><div class="section-title">Distribución de cierres por curso</div><div class="chart-container"><canvas id="wonByCursoChart"></canvas></div></div>
                    <div class="section"><div class="section-title">Evolución de cierres por día</div><div class="chart-container"><canvas id="wonByDateChart"></canvas></div></div>
                </div>
                <div class="section"><div class="section-title">Leads cualificados (F2) por día</div><div class="chart-container" style="height:260px"><canvas id="f2ByDateChart"></canvas></div></div>
            `;

            // Pipeline por País — tratos TOTALES (F1+F2+F3+F4+Won) por país, leyendo el campo País del TRATO (ac-extra), del periodo.
            const hasF1 = !!(extra && extra.by_pais && Object.keys(extra.by_pais).length > 0);
            if (hasF1 || (data.pais_pipeline && Object.keys(data.pais_pipeline).length > 0)) {
                let rows;
                if (hasF1) {
                    rows = Object.entries(extra.by_pais).map(([pais,c])=>({
                        pais, c:{f1:c.f1||0,f2:c.f2||0,f3:c.f3||0,f4:c.f4||0,won:c.won||0}, total:c.total||((c.f1||0)+(c.f2||0)+(c.f3||0)+(c.f4||0)+(c.won||0))
                    }));
                } else {
                    rows = Object.entries(paisPP).map(([pais,c])=>({
                        pais, c:{f1:null,f2:c.f2||0,f3:c.f3||0,f4:c.f4||0,won:c.won||0}, total:(c.f2||0)+(c.f3||0)+(c.f4||0)+(c.won||0)
                    }));
                }
                rows.sort((a,b)=> b.total-a.total || (b.c.won||0)-(a.c.won||0));
                const totalPaises = rows.length;
                const top = rows.slice(0,15);
                const maxTotal = Math.max(...top.map(r=>r.total),1);
                const grandTot = rows.reduce((s,r)=>s+(r.total||0),0) || 1;   // total de TODOS los países = base del "% del total"
                const note = hasF1 ? `Top 15 de ${totalPaises} países · TRATOS TOTALES (F1+F2+F3+F4+Won) creados en el periodo` : `Top 15 de ${totalPaises} países · Tratos F2→Won del periodo`;
                html += `<div class="section"><div class="section-title" style="display:flex;justify-content:space-between;align-items:center"><span>Pipeline por país</span><span style="font-weight:500;font-size:10.5px;color:var(--muted);text-transform:none;letter-spacing:0">${note}</span></div><div class="table-wrap"><table class="table">
                    <thead><tr><th>#</th><th>País</th><th style="color:var(--brand)">Tratos${hasF1?'':'<span style="font-weight:400;font-size:9px"> F2→Won</span>'}</th><th style="color:var(--slate)">F1</th><th style="color:var(--brand)">F2</th><th style="color:var(--brand-soft)">F3</th><th style="color:var(--gold)">F4</th><th style="color:var(--green)">Won</th><th style="color:var(--green)">% Venta</th><th style="color:var(--slate)" title="Peso del país sobre el total de tratos del periodo">% del total</th></tr></thead><tbody>`;
                const zz = v => v ? `<td class="num">${v}</td>` : `<td class="cell-zero">·</td>`;
                top.forEach(({pais,c,total}, i)=>{
                    const ventaPct = total>0 ? Math.round((c.won||0)/total*100) : 0;
                    const pctTot = Math.round(total/grandTot*100);
                    const heat = (0.08 + 0.42*(total/maxTotal)).toFixed(2);
                    const f1Cell = (c.f1===null) ? `<td class="cell-zero" title="Activa la clave de AC para el F1 por país">–</td>` : zz(c.f1);
                    html += `<tr>
                        <td><span class="rank-badge">${i+1}</span></td>
                        <td class="cell-strong">${pais}</td>
                        <td class="cell-total" style="background:rgba(31,42,78,${heat})">${total}</td>
                        ${f1Cell}${zz(c.f2)}${zz(c.f3)}${zz(c.f4)}
                        <td class="num ${c.won?'cell-win':'cell-zero'}">${c.won||0}</td>
                        <td class="num" style="font-weight:700;color:${ventaPct>0?'var(--green)':'#D6D1DA'}">${ventaPct}%</td>
                        <td class="num" style="font-weight:600;color:var(--slate)">${pctTot}%</td></tr>`;
                });
                // Fila TOTAL (global, TODOS los países). Sin clave AC, "Tratos" = F2+F3+F4+Won para que CUADRE con las filas.
                const T = (hasF1 && extra.totals) ? extra.totals : {f1:p.f1,f2:p.f2,f3:p.f3,f4:p.f4,won:w,total:(p.f2+p.f3+p.f4+w)};
                const gTot = hasF1 ? (T.total||0) : (p.f2+p.f3+p.f4+w);
                const gWon = hasF1 ? (T.won||0) : w;
                const gVenta = gTot>0 ? Math.round(gWon/gTot*100) : 0;
                const f1TotCell = hasF1
                    ? `<td class="num" style="font-weight:800">${T.f1||0}</td>`
                    : `<td class="num" style="font-weight:800;color:var(--muted)">(${p.f1})</td>`;
                html += `<tr style="background:var(--brand-tint);border-top:2px solid var(--brand)">
                    <td></td>
                    <td class="cell-strong" style="color:var(--brand-dark)">TOTAL${hasF1?' (con F1)':' (F2→Won)'} · ${totalPaises} países</td>
                    <td class="num" style="font-weight:800;color:var(--brand-dark)">${gTot}</td>
                    ${f1TotCell}
                    <td class="num" style="font-weight:800">${hasF1?(T.f2||0):p.f2}</td>
                    <td class="num" style="font-weight:800">${hasF1?(T.f3||0):p.f3}</td>
                    <td class="num" style="font-weight:800">${hasF1?(T.f4||0):p.f4}</td>
                    <td class="num cell-win" style="font-weight:800">${gWon}</td>
                    <td class="num" style="font-weight:800;color:var(--green)">${gVenta}%</td>
                    <td class="num" style="font-weight:800;color:var(--brand-dark)">100%</td></tr>`;
                html += `</tbody></table></div></div>`;
            }

            // Pipeline por CAMPAÑA (utm_campaign del trato) — mismo formato que país, ordenado por más tratos.
            if (extra && extra.by_campaign && Object.keys(extra.by_campaign).length > 0) {
                let crows = Object.entries(extra.by_campaign).map(([camp,c])=>({
                    camp, c:{f1:c.f1||0,f2:c.f2||0,f3:c.f3||0,f4:c.f4||0,won:c.won||0}, total:c.total||((c.f1||0)+(c.f2||0)+(c.f3||0)+(c.f4||0)+(c.won||0))
                }));
                crows.sort((a,b)=> b.total-a.total || (b.c.won||0)-(a.c.won||0));
                const totalCamps = crows.length;
                const ctop = crows.slice(0,15);
                const cMax = Math.max(...ctop.map(r=>r.total),1);
                const zc = v => v ? `<td class="num">${v}</td>` : `<td class="cell-zero">·</td>`;
                const utmTitle = (extra && extra.utm_title) || 'campaña';
                const utmTitlePl = (extra && extra.utm_title_pl) || 'campañas';
                const utmLabel = (extra && extra.utm_label) || 'utm_campaign';
                const utmTitleCap = utmTitle.charAt(0).toUpperCase() + utmTitle.slice(1);
                html += `<div class="section"><div class="section-title" style="display:flex;justify-content:space-between;align-items:center"><span>Pipeline por ${utmTitle} (UTM)</span><span style="font-weight:500;font-size:10.5px;color:var(--muted);text-transform:none;letter-spacing:0">Top ${Math.min(15,totalCamps)} de ${totalCamps} ${utmTitlePl} · TRATOS TOTALES (F1+F2+F3+F4+Won) creados en el periodo</span></div><div class="table-wrap"><table class="table">
                    <thead><tr><th>#</th><th>${utmTitleCap} (${utmLabel})</th><th style="color:var(--brand)">Tratos</th><th style="color:var(--slate)">F1</th><th style="color:var(--brand)">F2</th><th style="color:var(--brand-soft)">F3</th><th style="color:var(--gold)">F4</th><th style="color:var(--green)">Won</th><th style="color:var(--green)">% Venta</th></tr></thead><tbody>`;
                ctop.forEach(({camp,c,total}, i)=>{
                    const ventaPct = total>0 ? Math.round((c.won||0)/total*100) : 0;
                    const heat = (0.08 + 0.42*(total/cMax)).toFixed(2);
                    html += `<tr>
                        <td><span class="rank-badge">${i+1}</span></td>
                        <td class="cell-strong">${camp}</td>
                        <td class="cell-total" style="background:rgba(31,42,78,${heat})">${total}</td>
                        ${zc(c.f1)}${zc(c.f2)}${zc(c.f3)}${zc(c.f4)}
                        <td class="num ${c.won?'cell-win':'cell-zero'}">${c.won||0}</td>
                        <td class="num" style="font-weight:700;color:${ventaPct>0?'var(--green)':'#D6D1DA'}">${ventaPct}%</td></tr>`;
                });
                const CT={f1:0,f2:0,f3:0,f4:0,won:0,total:0};
                crows.forEach(({c,total})=>{CT.f1+=c.f1;CT.f2+=c.f2;CT.f3+=c.f3;CT.f4+=c.f4;CT.won+=c.won;CT.total+=total;});
                const cVenta = CT.total>0 ? Math.round(CT.won/CT.total*100) : 0;
                html += `<tr style="background:var(--brand-tint);border-top:2px solid var(--brand)">
                    <td></td>
                    <td class="cell-strong" style="color:var(--brand-dark)">TOTAL · ${totalCamps} ${utmTitlePl}</td>
                    <td class="num" style="font-weight:800;color:var(--brand-dark)">${CT.total}</td>
                    <td class="num" style="font-weight:800">${CT.f1}</td>
                    <td class="num" style="font-weight:800">${CT.f2}</td>
                    <td class="num" style="font-weight:800">${CT.f3}</td>
                    <td class="num" style="font-weight:800">${CT.f4}</td>
                    <td class="num cell-win" style="font-weight:800">${CT.won}</td>
                    <td class="num" style="font-weight:800;color:var(--green)">${cVenta}%</td></tr>`;
                html += `</tbody></table></div></div>`;
            }

            // ── Tabla EXTRA: Rendimiento por vendedor (ac-extra, del periodo, dato fiable) ──
            if (extra && extra.ok && extra.by_owner && Object.keys(extra.by_owner).length) {
                html += renderOwnerTable(extra.by_owner);
                if (extra.sin_pais) html += `<div style="max-width:1440px;margin:0 auto 22px;background:#FFF6E9;border:1px solid #F0D9A8;border-radius:12px;padding:14px 18px;font-size:12.5px;color:#7A5A1E"><strong>⚠️ Calidad de dato en el CRM:</strong> los tratos abiertos (F1-F4) recientes <b>no tienen País ni Curso</b> — esos campos solo están en los cerrados. Por eso el desglose por país/curso usa los <b>cierres</b>. Recomendado: exigir País y Curso en el formulario de entrada.</div>`;
            }

            // Matriz Curso x País — desde los CIERRES reales del periodo (won_deals) SIN paciente modelo → su TOTAL
            // cuadra con el Won del embudo. Países unificados (US=United States).
            const _matrixSrc = {};
            (data.won_deals||[]).forEach(d=>{ if(pmWonSet.has(d.id)) return; const cu=d.curso||'Sin curso'; const pa=d.pais||'Sin país'; (_matrixSrc[cu]=_matrixSrc[cu]||{}); _matrixSrc[cu][pa]=(_matrixSrc[cu][pa]||0)+1; });
            if (Object.keys(_matrixSrc).length > 0) {
                const matrixN = {};
                Object.entries(_matrixSrc).forEach(([curso,pv])=>{
                    matrixN[curso] = matrixN[curso] || {};
                    Object.entries(pv).forEach(([p,v])=>{ const k=normPais(p); matrixN[curso][k]=(matrixN[curso][k]||0)+v; });
                });
                const paisWon = {};
                Object.values(matrixN).forEach(pv => Object.entries(pv).forEach(([p,v]) => { paisWon[p]=(paisWon[p]||0)+v; }));
                const paisTratos = {};
                Object.entries(paisPP).forEach(([p,c])=>{ paisTratos[p]=(c.f2||0)+(c.f3||0)+(c.f4||0)+(c.won||0); });
                const paises = Object.keys(paisWon).sort((a,b)=>(paisTratos[b]||0)-(paisTratos[a]||0) || paisWon[b]-paisWon[a]).slice(0,15);
                const maxCell = Math.max(...Object.values(matrixN).flatMap(pv=>Object.values(pv)),1);
                // ordenar cursos por total de cierres
                const cursosOrd = Object.entries(matrixN).map(([curso,pv])=>({
                    curso, pv, tot:Object.values(pv).reduce((a,b)=>a+b,0)
                })).sort((a,b)=>b.tot-a.tot);
                html += `<div class="section"><div class="section-title" style="display:flex;justify-content:space-between;align-items:center"><span>Matriz curso × país · cierres</span><span style="font-weight:500;font-size:10.5px;color:var(--muted);text-transform:none;letter-spacing:0">Países ordenados por nº de tratos · intensidad = nº de cierres</span></div><div class="table-wrap"><table class="table">
                    <thead><tr><th>Curso</th><th style="color:var(--brand)">Total</th>${paises.map(p=>`<th class="num">${p}</th>`).join('')}</tr></thead><tbody>`;
                cursosOrd.forEach(({curso, pv, tot})=>{
                    html += `<tr><td class="cell-strong">${curso||'Sin curso'}</td><td class="cell-total">${tot}</td>${paises.map(p=>{
                        const v = pv[p]||0;
                        if(!v) return `<td class="cell-zero">·</td>`;
                        const a = (0.15 + 0.6*(v/maxCell)).toFixed(2);
                        return `<td class="cell-heat" style="background:rgba(31,42,78,${a})">${v}</td>`;
                    }).join('')}</tr>`;
                });
                const colTot = {}; let grand = 0;
                cursosOrd.forEach(({pv, tot})=>{ grand += tot; paises.forEach(p=>{ colTot[p] = (colTot[p]||0) + (pv[p]||0); }); });
                html += `<tr style="background:var(--brand-tint);border-top:2px solid var(--brand)"><td class="cell-strong" style="color:var(--brand-dark)">TOTAL</td><td class="cell-total" style="font-weight:800">${grand}</td>${paises.map(p=>`<td class="num" style="font-weight:800">${colTot[p]||0}</td>`).join('')}</tr>`;
                html += `</tbody></table></div></div>`;
            }

            document.getElementById('dashboardContent').innerHTML = html;
            renderCharts(data, extra);
        }

        function bdRows(obj){
            return Object.entries(obj||{}).map(([k,c])=>({
                k, f1:c.f1||0, f2:c.f2||0, f3:c.f3||0, f4:c.f4||0, won:c.won||0,
                total:c.total||((c.f1||0)+(c.f2||0)+(c.f3||0)+(c.f4||0)+(c.won||0))
            })).sort((a,b)=>b.total-a.total);
        }
        function bdTable(title, note, colLabel, rows, rateLabel){
            if(!rows.length) return '';
            const maxT = Math.max(...rows.map(r=>r.total),1);
            let h = `<div class="section"><div class="section-title" style="display:flex;justify-content:space-between;align-items:center"><span>${title}</span><span style="font-weight:500;font-size:10.5px;color:var(--muted);text-transform:none;letter-spacing:0">${note}</span></div><div class="table-wrap"><table class="table"><thead><tr><th>${colLabel}</th><th style="color:var(--brand)">Tratos</th><th style="color:var(--slate)">F1</th><th style="color:var(--brand)">F2</th><th style="color:var(--brand-soft)">F3</th><th style="color:var(--gold)">F4</th><th style="color:var(--green)">Won</th><th style="color:var(--green)">${rateLabel}</th></tr></thead><tbody>`;
            rows.forEach((r,i)=>{
                const rate = r.total>0?Math.round(r.won/r.total*100):0;
                const z = v => v?`<td class="num">${v}</td>`:`<td class="cell-zero">·</td>`;
                const heat=(0.08+0.42*(r.total/maxT)).toFixed(2);
                h+=`<tr><td class="cell-strong">${r.k}</td><td class="cell-total" style="background:rgba(31,42,78,${heat})">${r.total}</td>${z(r.f1)}${z(r.f2)}${z(r.f3)}${z(r.f4)}<td class="num ${r.won?'cell-win':'cell-zero'}">${r.won}</td><td class="num" style="font-weight:700;color:${rate>0?'var(--green)':'#D6D1DA'}">${rate}%</td></tr>`;
            });
            // Fila TOTAL de totales
            const G = rows.reduce((a,r)=>({f1:a.f1+(r.f1||0),f2:a.f2+(r.f2||0),f3:a.f3+(r.f3||0),f4:a.f4+(r.f4||0),won:a.won+(r.won||0),total:a.total+(r.total||0)}),{f1:0,f2:0,f3:0,f4:0,won:0,total:0});
            const Grate = G.total>0?Math.round(G.won/G.total*100):0;
            h+=`<tr style="background:var(--brand-tint);border-top:2px solid var(--brand)"><td class="cell-strong" style="color:var(--brand-dark)">TOTAL</td><td class="num" style="font-weight:800;color:var(--brand-dark)">${G.total}</td><td class="num" style="font-weight:800">${G.f1}</td><td class="num" style="font-weight:800">${G.f2}</td><td class="num" style="font-weight:800">${G.f3}</td><td class="num" style="font-weight:800">${G.f4}</td><td class="num cell-win" style="font-weight:800">${G.won}</td><td class="num" style="font-weight:800;color:var(--green)">${Grate}%</td></tr>`;
            return h + `</tbody></table></div></div>`;
        }
        function renderBreakdownTable(title, obj, colLabel){
            return bdTable(title, 'Todos los tratos por etapa', colLabel, bdRows(obj), '% Venta');
        }
        function renderTop10Paises(obj){
            return bdTable('Top 10 países por tratos creados', 'Top 10 · todos los tratos por etapa', 'País', bdRows(obj).slice(0,10), '% Venta');
        }
        function renderOwnerTable(obj){
            // Owners que NO son vendedores comerciales → se agrupan en "Otros" (el TOTAL sigue cuadrando con país)
            const NON_SELLER = ['Pacientes modelo EIMEC Formación','EIMEC Formación','Maykel Sanchez','Sin asignar'];
            const grouped = {};
            Object.entries(obj||{}).forEach(([k,v])=>{
                const key = NON_SELLER.includes(k) ? 'Otros / no comercial' : k;
                if(!grouped[key]) grouped[key]={f1:0,f2:0,f3:0,f4:0,won:0,total:0};
                ['f1','f2','f3','f4','won','total'].forEach(m=>grouped[key][m]+=(v[m]||0));
            });
            if (grouped['Otros / no comercial'] && grouped['Otros / no comercial'].total===0) delete grouped['Otros / no comercial'];
            return bdTable('Rendimiento por vendedor', 'Tratos creados en el periodo · % Rate = Won ÷ total', 'Vendedor', bdRows(grouped), '% Rate');
        }
        function renderCursoTable(obj){
            return bdTable('Tratos por curso', 'Tratos creados en el periodo · ordenado por volumen', 'Curso', bdRows(obj), '% Venta');
        }
        function topBy(obj, metric, exclude){
            return Object.entries(obj||{}).filter(([k])=>!(exclude||[]).includes(k))
                .map(([k,v])=>({k, ...v})).sort((a,b)=>(b[metric]||0)-(a[metric]||0));
        }
        function renderInsights(extra, data){
            const EXC_O = ['Sin asignar','Pacientes modelo EIMEC Formación','EIMEC Formación'];
            const arr = (obj, exc)=> Object.entries(obj||{}).filter(([k])=>!(exc||[]).includes(k)).map(([k,v])=>({k,...v}));
            // País y curso REALES del trato (ac-extra, del periodo)
            const paisArr = arr(extra.by_pais, ['Sin país','Sin dato']);
            const cursoArr = arr(extra.by_curso, ['Sin curso','Sin dato']);
            // ordenar por won con DESEMPATE por volumen de tratos (evita elegir al azar entre empatados)
            const byWon = a => [...a].sort((x,y)=>(y.won||0)-(x.won||0) || (y.total||0)-(x.total||0));
            const cursoWon = byWon(cursoArr);
            const cursoVol = [...cursoArr].sort((a,b)=>(b.total||0)-(a.total||0));
            const cursoStuck = [...cursoArr].filter(c=>(c.won||0)===0 && (c.f2||0)>0).sort((a,b)=>(b.f2||0)-(a.f2||0));
            const paisWon = byWon(paisArr);
            const paisVol = [...paisArr].sort((a,b)=>(b.total||0)-(a.total||0));
            const owners = byWon(arr(extra.by_owner, EXC_O));
            const T = extra.totals||{};
            const winGlobal = T.total>0 ? Math.round((T.won||0)/T.total*100) : 0;
            // Honestidad con empates: si varios cursos/países empatan en el nº MÁXIMO de cierres, no coronar a uno al azar.
            const sinCursoWon = (extra.by_curso && extra.by_curso['Sin curso']) ? (extra.by_curso['Sin curso'].won||0) : 0;
            const cw = cursoWon[0], pw = paisWon[0];
            const topTie = (sorted, fullArr, noun) => {
                const top = sorted[0]; const n = top ? (top.won||0) : 0;
                if (!top || n===0) return { v:'—', s:'sin cierres en el periodo', tie:false };
                const tied = fullArr.filter(x=>(x.won||0)===n).map(x=>x.k);
                if (tied.length>1) {
                    const names = tied.slice(0,3).join(', ') + (tied.length>3?' y '+(tied.length-3)+' más':'');
                    return { v:`Empate a ${n}`, s:`${tied.length} ${noun} con ${n} cierre${n!==1?'s':''}: ${names}`, tie:true };
                }
                return { v: top.k, s:`${n} cierre${n!==1?'s':''}`, tie:false };
            };
            const cursoTop = topTie(cursoWon, cursoArr, 'cursos');
            const paisTop = topTie(paisWon, paisArr, 'países');
            const cards = [
                {t:'Curso más vendido', v: cursoTop.v, s: cursoTop.s},
                {t:'Curso con más tratos', v: cursoVol[0]?cursoVol[0].k:'—', s: cursoVol[0]?cursoVol[0].total+' tratos':'—'},
                {t:'Curso estancado (F2 sin cerrar)', v: cursoStuck[0]?cursoStuck[0].k:'—', s: cursoStuck[0]?cursoStuck[0].f2+' en F2, 0 cierres':'—'},
                {t:'País con más tratos', v: paisVol[0]?paisVol[0].k:'—', s: paisVol[0]?paisVol[0].total+' tratos':'—'},
                {t:'País que más cierra', v: paisTop.v, s: paisTop.s},
                {t:'Win rate global periodo', v: winGlobal+'%', s: `${(T.won||0)} won de ${(T.total||0)} tratos${sinCursoWon?' · '+sinCursoWon+' sin curso':''}`}
            ];
            const paisQual = [...paisArr].sort((a,b)=>(b.f2||0)-(a.f2||0));
            let h = `<div class="section"><div class="section-title">6 insights del periodo${data.period?' · '+fmtDate(data.period.from)+' — '+fmtDate(data.period.to):''}</div><div class="cards-grid">`;
            cards.forEach(c=> h += `<div class="card"><div class="card-label">${c.t}</div><div class="card-value" style="font-size:19px;line-height:1.15">${c.v}</div><div class="card-foot">${c.s}</div></div>`);
            h += `</div>`;
            const recs = [];
            if (paisQual[0] && paisQual[0].f2) recs.push(`<b>${paisQual[0].k}</b>: ${paisQual[0].f2} cualificados (F2) sin cerrar — priorizar seguimiento comercial esta semana.`);
            if (paisWon[0] && paisWon[0].won && !paisTop.tie) recs.push(`<b>${paisWon[0].k}</b> lidera cierres (${paisWon[0].won}) — reforzar inversión y replicar en países similares.`);
            if (cursoStuck[0]) recs.push(`Curso <b>${cursoStuck[0].k}</b>: ${cursoStuck[0].f2} tratos en F2 sin cerrar — revisar propuesta/precio.`);
            if (cursoWon[0] && cursoWon[0].won>0 && !cursoTop.tie) recs.push(`<b>${cursoWon[0].k}</b> es el curso top en ventas (${cursoWon[0].won}) — empujar con campañas específicas.`);
            if (owners[0]) recs.push(`<b>${owners[0].k}</b> es el vendedor con más cierres — compartir sus buenas prácticas con el equipo.`);
            h += `<div style="margin-top:14px;background:var(--brand-tint);border-radius:10px;padding:14px 18px;font-size:13px;color:var(--ink)"><b style="color:var(--brand)">Recomendaciones — dónde atacar la semana que viene:</b><ul style="margin:8px 0 0 18px">${recs.map(r=>`<li style="margin-bottom:5px">${r}</li>`).join('')}</ul></div>`;
            return h + `</div>`;
        }

        function flagOf(name){
            const F = {'Spain':'🇪🇸','Mexico':'🇲🇽','Chile':'🇨🇱','Peru':'🇵🇪','Argentina':'🇦🇷','Colombia':'🇨🇴','Italy':'🇮🇹','France':'🇫🇷','Germany':'🇩🇪','United States':'🇺🇸','United Kingdom':'🇬🇧','Brazil':'🇧🇷','Venezuela':'🇻🇪','Guatemala':'🇬🇹','Poland':'🇵🇱','Portugal':'🇵🇹','Ireland':'🇮🇪','Ecuador':'🇪🇨','Bolivia':'🇧🇴','Uruguay':'🇺🇾','Costa Rica':'🇨🇷','Panama':'🇵🇦','Libya':'🇱🇾','Israel':'🇮🇱','Pakistan':'🇵🇰','India':'🇮🇳','Switzerland':'🇨🇭','Netherlands':'🇳🇱','Belgium':'🇧🇪','Romania':'🇷🇴','Ukraine':'🇺🇦','Turkey':'🇹🇷','Saudi Arabia':'🇸🇦','United Arab Emirates':'🇦🇪','Nigeria':'🇳🇬','Morocco':'🇲🇦'};
            return F[name] || '🏳️';
        }
        function renderPodium(extra){
            const all = Object.entries(extra.by_pais||{}).filter(([k])=>k!=='Sin país'&&k!=='Sin dato')
                .map(([k,v])=>({k,won:v.won||0,total:v.total||0})).filter(x=>x.won>0)
                .sort((a,b)=>(b.won-a.won) || (b.total-a.total)); // desempate por volumen de tratos
            if(!all.length) return '';
            const arr = all.slice(0,3);
            const totalVentas = all.reduce((s,x)=>s+x.won,0);
            const step = (p,h,medal,cls)=> p ? `<div class="podium-step"><div class="podium-flag">${flagOf(p.k)}</div><div class="podium-name">${p.k}</div><div class="podium-won"><b>${p.won}</b> ventas · ${p.total} tratos</div><div class="podium-bar ${cls}" style="height:${h}px"><div class="podium-place">${medal}</div></div></div>` : '<div class="podium-step"></div>';
            const note = `${extra.period?fmtDate(extra.period.from)+' — '+fmtDate(extra.period.to)+' · ':''}${all.length} países con ventas · ${totalVentas} en total · #2 y #3 por volumen`;
            return `<div class="section"><div class="section-title" style="display:flex;justify-content:space-between;align-items:center"><span>🏆 Podio de países por ventas</span><span style="font-weight:500;font-size:10.5px;color:var(--muted);text-transform:none;letter-spacing:0">${note}</span></div><div class="podium">${step(arr[1],120,'2','silver')}${step(arr[0],175,'1','gold')}${step(arr[2],95,'3','bronze')}</div></div>`;
        }
        function baseOpts(extra){
            return Object.assign({
                responsive:true, maintainAspectRatio:false,
                plugins:{ legend:{ labels:{ font:{family:'Montserrat',size:12}, color:'#6B6472', usePointStyle:true, boxWidth:8, padding:14 } } }
            }, extra||{});
        }

        function renderCharts(data, extra) {
            // Tratos creados por día (ac-extra)
            if (extra && extra.created_by_date && document.getElementById('createdByDateChart')) {
                if (charts.createdByDate) charts.createdByDate.destroy();
                const ctxC = document.getElementById('createdByDateChart').getContext('2d');
                const gradC = ctxC.createLinearGradient(0,0,0,280);
                gradC.addColorStop(0,'rgba(31,42,78,.28)'); gradC.addColorStop(1,'rgba(31,42,78,0)');
                charts.createdByDate = new Chart(ctxC, {
                    type:'line',
                    data:{ labels:Object.keys(extra.created_by_date), datasets:[{ label:'Tratos creados', data:Object.values(extra.created_by_date), borderColor:'#1F2A4E', backgroundColor:gradC, fill:true, tension:.35, pointRadius:2, pointBackgroundColor:'#1F2A4E', borderWidth:2.5 }] },
                    options: baseOpts({ plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false},ticks:{font:{family:'Montserrat',size:10},color:'#9A93A2',maxRotation:45}}, y:{grid:{color:'#EDF0F4'},ticks:{font:{family:'Montserrat',size:11},color:'#9A93A2',precision:0}} } })
                });
            }
            // "Paciente modelo" excluido también de los gráficos de cierres (consistencia con embudo/tablas)
            const _pmSet = new Set((extra && extra.pm_won_ids) || []);
            const _wonClean = (data.won_deals||[]).filter(d => !_pmSet.has(d.id));
            const cursoData = {};
            _wonClean.forEach(d => { const c = d.curso || 'Sin curso'; cursoData[c]=(cursoData[c]||0)+1; });
            const wonByDateSorted = {};
            const _wbd = {};
            _wonClean.forEach(d => { const dt = (d.date||'').slice(0,10); if(dt) _wbd[dt]=(_wbd[dt]||0)+1; });
            Object.keys(_wbd).sort().forEach(k=>{ wonByDateSorted[k]=_wbd[k]; });

            if (document.getElementById('wonByCursoChart')) {
                if (charts.wonByCurso) charts.wonByCurso.destroy();
                charts.wonByCurso = new Chart(document.getElementById('wonByCursoChart'), {
                    type:'doughnut',
                    data:{ labels:Object.keys(cursoData), datasets:[{ data:Object.values(cursoData), backgroundColor:PALETTE, borderWidth:2, borderColor:'#fff' }] },
                    options: baseOpts({ cutout:'62%', plugins:{ legend:{ position:'right', labels:{ font:{family:'Montserrat',size:12}, color:'#6B6472', usePointStyle:true, boxWidth:8, padding:12 } } } })
                });
            }
            if (Object.keys(wonByDateSorted).length && document.getElementById('wonByDateChart')) {
                if (charts.wonByDate) charts.wonByDate.destroy();
                const ctx = document.getElementById('wonByDateChart').getContext('2d');
                const grad = ctx.createLinearGradient(0,0,0,300);
                grad.addColorStop(0,'rgba(0,155,155,.28)'); grad.addColorStop(1,'rgba(0,155,155,0)');
                charts.wonByDate = new Chart(ctx, {
                    type:'line',
                    data:{ labels:Object.keys(wonByDateSorted), datasets:[{ label:'Cierres', data:Object.values(wonByDateSorted), borderColor:'#009B9B', backgroundColor:grad, fill:true, tension:.4, pointRadius:3, pointBackgroundColor:'#009B9B', borderWidth:2.5 }] },
                    options: baseOpts({ plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false},ticks:{font:{family:'Montserrat',size:10},color:'#9A93A2',maxRotation:45}}, y:{grid:{color:'#F0EDF1'},ticks:{font:{family:'Montserrat',size:11},color:'#9A93A2',precision:0}} } })
                });
            }
            if (data.f2_by_date && document.getElementById('f2ByDateChart')) {
                if (charts.f2ByDate) charts.f2ByDate.destroy();
                charts.f2ByDate = new Chart(document.getElementById('f2ByDateChart'), {
                    type:'bar',
                    data:{ labels:Object.keys(data.f2_by_date), datasets:[{ label:'F2 cualificados', data:Object.values(data.f2_by_date), backgroundColor:'#1F2A4E', borderRadius:4, maxBarThickness:22 }] },
                    options: baseOpts({ plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false},ticks:{font:{family:'Montserrat',size:10},color:'#9A93A2',maxRotation:45}}, y:{grid:{color:'#F0EDF1'},ticks:{font:{family:'Montserrat',size:11},color:'#9A93A2',precision:0}} } })
                });
            }
        }

        if (sessionStorage.getItem('authenticated') === 'true') { showDashboard(); loadDashboardData(); }
        setInterval(() => { if (sessionStorage.getItem('authenticated') === 'true') loadDashboardData(); }, 5 * 60 * 1000);
    </script>
</body>
